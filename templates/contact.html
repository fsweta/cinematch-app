<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact — CineMatch</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"/>
</head>
<body>
  <nav class="navbar">
    <div class="nav-logo">🎬 CineMatch</div>
    <div class="nav-links">
      <a href="/" class="nav-link">Home</a>
      <a href="/movies" class="nav-link">Movies</a>
      <a href="/genres" class="nav-link">Genres</a>
      <a href="/trending" class="nav-link">Trending</a>
      <a href="/toprated" class="nav-link">Top Rated</a>
      <a href="/about" class="nav-link">About</a>
      <a href="/contact" class="nav-link active">Contact</a>
    </div>
    <div class="nav-actions">
      <button class="dark-toggle">🌙 Dark Mode</button>
    </div>
  </nav>

  <section style="padding:120px 5% 60px; max-width:600px; margin:0 auto;">
    <h1 style="font-size:2rem; font-weight:900; margin-bottom:8px;">📬 Contact Us</h1>
    <p style="color:#888; margin-bottom:40px;">Have feedback or questions? We'd love to hear from you!</p>

    <div style="background:#141414; border:1px solid #2a2a2a; border-radius:12px; padding:32px;">
      <div class="input-group">
        <label style="display:block; font-size:0.78rem; color:#aaa; margin-bottom:6px; font-weight:600; text-transform:uppercase; letter-spacing:0.5px;">Your Name</label>
        <input type="text" id="contactName" placeholder="Enter your name"
          style="width:100%; padding:12px 14px; background:rgba(255,255,255,0.05);
          border:1px solid #2a2a2a; border-radius:6px; color:#fff; font-size:0.9rem;"/>
      </div>
      <br/>
      <div class="input-group">
        <label style="display:block; font-size:0.78rem; color:#aaa; margin-bottom:6px; font-weight:600; text-transform:uppercase; letter-spacing:0.5px;">Email</label>
        <input type="email" id="contactEmail" placeholder="Enter your email"
          style="width:100%; padding:12px 14px; background:rgba(255,255,255,0.05);
          border:1px solid #2a2a2a; border-radius:6px; color:#fff; font-size:0.9rem;"/>
      </div>
      <br/>
      <div class="input-group">
        <label style="display:block; font-size:0.78rem; color:#aaa; margin-bottom:6px; font-weight:600; text-transform:uppercase; letter-spacing:0.5px;">Message</label>
        <textarea id="contactMsg" placeholder="Write your message..."
          style="width:100%; padding:12px 14px; background:rgba(255,255,255,0.05);
          border:1px solid #2a2a2a; border-radius:6px; color:#fff; font-size:0.9rem;
          height:120px; resize:vertical; font-family:inherit;"></textarea>
      </div>
      <br/>
      <button onclick="sendMessage()"
        style="width:100%; padding:13px; background:var(--red); color:#fff;
        border:none; border-radius:6px; font-size:0.95rem; font-weight:700; cursor:pointer;">
        📨 Send Message
      </button>
      <div id="successMsg" style="display:none; text-align:center; margin-top:20px;
        color:#10b981; font-weight:600;">✅ Message sent successfully! We'll get back to you soon.</div>
    </div>
  </section>

  <footer class="footer">
    <p>Built with Flask · Scikit-learn · TMDB Dataset | College Internship Project</p>
  </footer>

  <script>
    function sendMessage() {
      const name = document.getElementById('contactName').value.trim();
      const email = document.getElementById('contactEmail').value.trim();
      const msg = document.getElementById('contactMsg').value.trim();
      if (!name || !email || !msg) { alert('⚠️ Please fill all fields!'); return; }
      document.getElementById('successMsg').style.display = 'block';
      document.getElementById('contactName').value = '';
      document.getElementById('contactEmail').value = '';
      document.getElementById('contactMsg').value = '';
    }
  </script>
</body>
</html>
